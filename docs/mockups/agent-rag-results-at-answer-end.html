<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Looma Agent · 回答末尾 RAG 检索结果</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;color-scheme:light}
[data-theme=light]{--bg:#f4f5f7;--panel:#fff;--panel-soft:#f8fafc;--text:#1f2937;--muted:#5f6b7a;--subtle:#9aa4b2;--border:#dbe1e8;--accent:#3b82f6;--accent-soft:#dbeafe;--success:#16a34a}
[data-theme=dark]{color-scheme:dark;--bg:#202225;--panel:#2a2d31;--panel-soft:#32363b;--text:#e7e9ed;--muted:#b5bdc8;--subtle:#7f8895;--border:#3d424a;--accent:#6ea8ff;--accent-soft:rgb(110 168 255/.18);--success:#63c174}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text)}button{font:inherit}.toolbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:color-mix(in srgb,var(--panel) 92%,transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}.toolbar h1{font-size:14px;margin:0}.toolbar div{display:flex;gap:8px}.toolbar button,.tabs button{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:7px;padding:6px 10px;cursor:pointer}.tabs{display:flex;justify-content:center;gap:8px;padding:16px}.tabs button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}.canvas{display:grid;grid-template-columns:minmax(500px,720px) 340px;gap:24px;justify-content:center;padding:6px 24px 40px}.frame{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgb(15 23 42/.06)}.frame-title{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}.chat{padding:22px;min-height:620px}.mobile .chat{padding:14px;min-height:620px}.assistant{max-width:100%}.answer{font-size:14px;line-height:1.75}.answer h3{font-size:15px;margin:0 0 8px}.answer p{margin:0 0 10px}.answer code{background:var(--panel-soft);padding:1px 4px;border-radius:4px}.rag{margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}.rag-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}.rag-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:650;color:var(--muted)}.count{font-size:10px;color:var(--subtle)}.source-row{display:grid;grid-template-columns:20px minmax(0,1fr) auto;align-items:center;gap:7px;width:100%;padding:6px 4px;border:0;background:transparent;color:inherit;text-align:left;border-radius:6px;cursor:pointer}.source-row:hover{background:var(--panel-soft)}.num{display:grid;place-items:center;width:18px;height:18px;border-radius:5px;background:var(--accent-soft);color:var(--accent);font-size:9px;font-weight:700}.source-main{display:block;min-width:0;overflow:hidden}.source-name{display:block;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.source-path{display:block;font-size:9px;color:var(--subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:9px;color:var(--success)}.snippet{display:none;margin:2px 4px 7px 31px;padding:7px 9px;border-left:2px solid var(--border);font-size:9px;line-height:1.55;color:var(--muted);background:var(--panel-soft);border-radius:0 6px 6px 0}.source-item.open .snippet{display:block}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{display:inline-flex;align-items:center;gap:5px;max-width:100%;border:1px solid var(--border);background:transparent;color:var(--muted);padding:4px 7px;border-radius:999px;font-size:9px;cursor:pointer}.chip:hover{border-color:var(--accent);color:var(--accent)}.chip b{color:var(--accent)}.chip-panel{display:none;margin-top:8px;padding:9px;border:1px solid var(--border);border-radius:8px;background:var(--panel-soft);font-size:9px;color:var(--muted);line-height:1.55}.chip-panel.show{display:block}.bundle{border:1px solid var(--border);border-radius:8px;overflow:hidden}.bundle summary{display:flex;align-items:center;justify-content:space-between;list-style:none;padding:8px 10px;cursor:pointer;font-size:10px;color:var(--muted)}.bundle summary::-webkit-details-marker{display:none}.bundle-body{border-top:1px solid var(--border);padding:4px 6px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.card{padding:8px;border:1px solid var(--border);border-radius:7px;background:var(--panel-soft);cursor:pointer;min-width:0}.card:hover{border-color:var(--accent)}.card-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-meta{display:flex;justify-content:space-between;gap:5px;margin-top:3px;font-size:8px;color:var(--subtle)}.card-snippet{margin-top:6px;font-size:9px;line-height:1.45;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.mobile .cards{grid-template-columns:1fr}.mobile{width:340px}.note{margin:0 auto 22px;max-width:1084px;padding:0 24px;color:var(--muted);font-size:11px}.hidden{display:none!important}@media(max-width:900px){.canvas{grid-template-columns:1fr}.mobile{width:100%}}
</style>
</head>
<body>
<header class="toolbar"><h1>Agent 回答末尾 · RAG 检索结果</h1><div><button id="theme">切换主题</button></div></header>
<nav class="tabs"><button class="active" data-v="a">A 紧凑来源列表</button><button data-v="b">B 引用标签</button><button data-v="c">C 折叠卡片</button></nav>
<p class="note">三个方案都位于最终回答正文之后。点击来源可展开片段；生产实现中点击文件路径将沿用 Looma 工作区安全路径打开文件。</p>
<main class="canvas">
<section class="frame"><div class="frame-title"><span>桌面 AI 对话栏</span><span>720 px</span></div><div class="chat" id="desktop"></div></section>
<section class="frame mobile"><div class="frame-title"><span>窄屏预览</span><span>340 px</span></div><div class="chat" id="mobile"></div></section>
</main>
<template id="base"><article class="assistant"><div class="answer"><h3>工作空间检索结果总结</h3><p>项目使用 <code>workspace_search</code> 在本地索引中查询相关内容。Agent 根据检索到的文档确认：工具调用会经过脱敏后写入本地 timeline，重新打开对话时仍可恢复。</p><p>建议继续保持 Electron Main 作为可信写入边界，并对来源路径执行相对路径校验。</p></div><div class="mount"></div></article></template>
<script>
const sources=[
 {name:'agent-inline-conversation-ui.md',path:'docs/references/agent-inline-conversation-ui.md',score:'96%',text:'Agent 执行过程直接嵌入 assistant 消息；工具调用使用单行折叠样式，并保持来源路径可审计。'},
 {name:'workspaceAiService.ts',path:'src/main/services/workspace/workspaceAiService.ts',score:'91%',text:'工作空间 AI 状态写入 .looma/ai-assistant/state.json，并在 Main 进程规范化 timeline 输出。'},
 {name:'ai-assistant.ts',path:'src/renderer/stores/ai-assistant.ts',score:'87%',text:'sources 事件会转换为 source 类型 timeline output，保存文件路径、片段和相关度。'},
]
function listA(){return `<section class="rag"><div class="rag-head"><div class="rag-title">▤ 检索来源</div><span class="count">${sources.length} 条</span></div>${sources.map((s,i)=>`<div class="source-item"><button class="source-row"><span class="num">${i+1}</span><span class="source-main"><span class="source-name">${s.name}</span><span class="source-path">${s.path}</span></span><span class="score">${s.score}</span></button><div class="snippet">${s.text}<br><span style="color:var(--accent)">在工作区打开 ↗</span></div></div>`).join('')}</section>`}
function listB(){return `<section class="rag"><div class="rag-head"><div class="rag-title">⌕ 参考来源</div><span class="count">${sources.length} 条</span></div><div class="chips">${sources.map((s,i)=>`<button class="chip" data-i="${i}"><b>[${i+1}]</b><span>${s.name}</span><span>${s.score}</span></button>`).join('')}</div><div class="chip-panel"></div></section>`}
function listC(){return `<section class="rag"><details class="bundle"><summary><span>▤ RAG 检索结果 · ${sources.length} 条</span><span>展开⌄</span></summary><div class="bundle-body"><div class="cards">${sources.map(s=>`<article class="card"><div class="card-name">${s.name}</div><div class="card-meta"><span>${s.path}</span><span style="color:var(--success)">${s.score}</span></div><div class="card-snippet">${s.text}</div></article>`).join('')}</div></div></details></section>`}
let variant='a';
function renderInto(root){const node=document.querySelector('#base').content.cloneNode(true);node.querySelector('.mount').innerHTML=variant==='a'?listA():variant==='b'?listB():listC();root.replaceChildren(node);root.querySelectorAll('.source-row').forEach(x=>x.onclick=()=>x.closest('.source-item').classList.toggle('open'));root.querySelectorAll('.chip').forEach(x=>x.onclick=()=>{const s=sources[+x.dataset.i],p=root.querySelector('.chip-panel');p.innerHTML=`<b>${s.path}</b><br>${s.text}<br><span style="color:var(--accent)">在工作区打开 ↗</span>`;p.classList.add('show')})}
function render(){renderInto(document.querySelector('#desktop'));renderInto(document.querySelector('#mobile'))}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{variant=b.dataset.v;document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('active',x===b));render()});
document.querySelector('#theme').onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'};render();
</script>
</body>
</html>
